pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,json}"
      run: PATH="$HOME/.bun/bin:$PATH" bunx biome check --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
    typecheck:
      run: PATH="$HOME/.bun/bin:$PATH" bun run typecheck

commit-msg:
  commands:
    commitlint:
      run: PATH="$HOME/.bun/bin:$PATH" bunx commitlint --edit {1}
