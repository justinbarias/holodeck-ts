rc: |
  export PATH="$HOME/.bun/bin:$PATH"

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,json}"
      run: bunx biome check --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
    typecheck:
      run: bun run typecheck

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}
