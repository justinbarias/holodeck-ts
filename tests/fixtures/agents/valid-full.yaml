name: full-agent
description: Full configuration fixture with optional fields populated.
model:
  provider: anthropic
  name: claude-sonnet-4-20250514
  temperature: 0.7
  max_tokens: 2048
  auth_provider: api_key
instructions:
  inline: |
    You are a thorough assistant.
    Use tools when they provide better answers.
tools:
  - type: mcp
    name: docs_search
    description: Search documentation via stdio MCP
    transport: stdio
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - /tmp
    env:
      SEARCH_SCOPE: project
    request_timeout: 45
  - type: mcp
    name: remote_api
    description: Remote MCP server
    transport: http
    url: https://example.com/mcp
    headers:
      Authorization: Bearer token
    request_timeout: 30
claude:
  working_directory: .
  permission_mode: manual
  max_turns: 20
  extended_thinking:
    enabled: true
    budget_tokens: 5000
  web_search: false
  bash:
    enabled: true
    excluded_commands:
      - rm
    allow_unsafe: false
  file_system:
    read: true
    write: true
    edit: true
  subagents:
    enabled: false
    max_parallel: 4
  allowed_tools:
    - Read
    - Glob
